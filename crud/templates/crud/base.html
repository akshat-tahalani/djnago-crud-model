<!DOCTYPE html>
<html>
<head>
    <title>Course App</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            color: #333;
        }

        /* NAVBAR */
        nav {
            background: #2c3e50;
            padding: 15px 0;
        }
        nav .container {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 15px;
        }
        nav a:hover { color: #3498db; }

        /* CONTAINER CLASS — centers content, fixed max width */
        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* CARD CLASS — styled box for presenting content */
        .card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 24px;
            margin: 16px 0;
            transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-2px); }
        .card h2 { color: #2c3e50; margin-bottom: 8px; }
        .card p  { color: #666; margin-bottom: 12px; }

        /* BUTTON */
        .btn {
            display: inline-block;
            padding: 8px 18px;
            background: #3498db;
            color: white;
            border-radius: 6px;
            text-decoration: none;
            font-size: 14px;
            border: none;
            cursor: pointer;
        }
        .btn:hover { background: #2980b9; }
        .btn-green { background: #27ae60; }
        .btn-green:hover { background: #219150; }

        h1 { margin: 30px 0 10px; color: #2c3e50; }
    </style>
</head>
<body>
    <nav>
        <div class="container">
            <a href="/">🎓 CourseApp</a>
            <a href="/instructors/">Instructors</a>
        </div>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
