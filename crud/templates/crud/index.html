{% extends 'crud/base.html' %}

{% block content %}
<h1>All Courses</h1>

{% for course in courses %}
<div class="card">
    <h2>{{ course.name }}</h2>
    <p>{{ course.description }}</p>
    <a href="/course/{{ course.id }}/" class="btn">View Course →</a>
</div>
{% empty %}
    <p>No courses yet. Add some from the admin panel.</p>
{% endfor %}

{% endblock %}
